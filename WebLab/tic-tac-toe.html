<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>❌ Крестики-нолики | Пиксельная классика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 30% 10%, #0a0f2a, #030617);
            --card-bg: rgba(20, 25, 55, 0.65);
            --glass-border: 1px solid rgba(100, 150, 255, 0.25);
            --accent: #6c8eff;
            --text-light: #f0f3ff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text-light);
            position: relative;
            overflow-x: hidden;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 1rem;
            animation: floatParticle linear forwards;
            opacity: 0.4;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .main-card {
            max-width: 1300px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: var(--glass-border);
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow-title {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b2a5ff, #6c8eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 5px rgba(108, 142, 255, 0.3);}
            100% { text-shadow: 0 0 25px rgba(155, 110, 255, 0.6);}
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .canvas-area {
            text-align: center;
        }
        canvas {
            background: #1a1c2c;
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(108, 142, 255, 0.3);
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            cursor: pointer;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.5rem;
            padding: 1.2rem;
            min-width: 260px;
            backdrop-filter: blur(4px);
        }
        .status-box {
            background: #0a0c1a;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .status-box div {
            font-size: 1.3rem;
            font-weight: bold;
            color: #6c8eff;
        }
        .volume-control {
            margin: 1rem 0;
        }
        .volume-control label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background: #1e1f36;
            height: 4px;
            border-radius: 5px;
        }
        button {
            background: #2a2f4e;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
            width: 100%;
        }
        button:hover {
            background: var(--accent);
            transform: scale(0.98);
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #6c8eff;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            opacity: 0.5;
        }
        @media (max-width: 800px) {
            .game-container { flex-direction: column; align-items: center; }
            .info-panel { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1 class="glow-title">❌ КРЕСТИКИ-НОЛИКИ ⭕</h1>
    <div class="game-container">
        <div class="canvas-area">
            <canvas id="tttCanvas" width="450" height="450"></canvas>
            <div style="margin-top: 0.8rem; font-size:0.8rem;">клик по клетке | пауза: P | новая игра: пробел</div>
        </div>
        <div class="info-panel">
            <div class="status-box">
                📢 СТАТУС: <span id="gameStatus">Ход: X</span>
            </div>
            <div class="volume-control">
                <label>🔊 Громкость музыки: <span id="volumeValue">70%</span></label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            </div>
            <button id="resetBtn">🔄 Новая игра</button>
        </div>
    </div>
    <a href="index.html" class="back-link">← Вернуться в лабораторию</a>
    <footer>Музыка: tic_tac_toe_music.mp3 | Пиксельная графика | Без рекордов</footer>
</div>

<script>
    // ==================== ЧАСТИЦЫ ====================
    function createParticle() {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const icons = ['✨', '⭐', '❌', '⭕', '🎵', '🎮'];
        particle.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        particle.style.left = Math.random() * 100 + '%';
        particle.style.fontSize = (Math.random() * 20 + 12) + 'px';
        particle.style.animationDuration = (Math.random() * 6 + 5) + 's';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 10000);
    }
    setInterval(createParticle, 800);
    for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 200);

    // ==================== КРЕСТИКИ-НОЛИКИ ====================
    const canvas = document.getElementById('tttCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    const SIZE = 3;
    const CELL_SIZE = 150;
    let board = [
        ['', '', ''],
        ['', '', ''],
        ['', '', '']
    ];
    let currentPlayer = 'X';
    let gameActive = true;
    let gameStatus = document.getElementById('gameStatus');
    
    // Победы
    const winPatterns = [
        [[0,0], [0,1], [0,2]],
        [[1,0], [1,1], [1,2]],
        [[2,0], [2,1], [2,2]],
        [[0,0], [1,0], [2,0]],
        [[0,1], [1,1], [2,1]],
        [[0,2], [1,2], [2,2]],
        [[0,0], [1,1], [2,2]],
        [[0,2], [1,1], [2,0]]
    ];
    
    function drawPixelGrid() {
        ctx.clearRect(0, 0, 450, 450);
        ctx.fillStyle = '#1a1c2c';
        ctx.fillRect(0, 0, 450, 450);
        
        // Пиксельные линии сетки
        ctx.fillStyle = '#6c8eff';
        ctx.fillRect(CELL_SIZE - 3, 0, 6, 450);
        ctx.fillRect(CELL_SIZE * 2 - 3, 0, 6, 450);
        ctx.fillRect(0, CELL_SIZE - 3, 450, 6);
        ctx.fillRect(0, CELL_SIZE * 2 - 3, 450, 6);
        
        // Рамка
        ctx.strokeStyle = '#6c8eff';
        ctx.lineWidth = 4;
        ctx.strokeRect(2, 2, 446, 446);
    }
    
    function drawPixelX(x, y) {
        const offset = 25;
        const startX = x * CELL_SIZE;
        const startY = y * CELL_SIZE;
        
        ctx.fillStyle = '#6c8eff';
        // Линии крестика (пиксельные блоки)
        for (let i = 0; i < 100; i += 8) {
            ctx.fillRect(startX + offset + i, startY + offset + i, 6, 6);
            ctx.fillRect(startX + CELL_SIZE - offset - i, startY + offset + i, 6, 6);
        }
        // Дополнительная толщина
        for (let i = 0; i < 100; i += 8) {
            ctx.fillRect(startX + offset + i + 4, startY + offset + i, 4, 6);
            ctx.fillRect(startX + CELL_SIZE - offset - i - 2, startY + offset + i, 4, 6);
        }
    }
    
    function drawPixelO(x, y) {
        const startX = x * CELL_SIZE;
        const startY = y * CELL_SIZE;
        const centerX = startX + CELL_SIZE / 2;
        const centerY = startY + CELL_SIZE / 2;
        const radius = 45;
        
        ctx.fillStyle = '#f0a45a';
        // Пиксельный круг (приближение)
        for (let angle = 0; angle < 360; angle += 15) {
            const rad = angle * Math.PI / 180;
            const px = centerX + Math.cos(rad) * radius;
            const py = centerY + Math.sin(rad) * radius;
            ctx.fillRect(px - 4, py - 4, 8, 8);
        }
        for (let angle = 0; angle < 360; angle += 15) {
            const rad = angle * Math.PI / 180;
            const px = centerX + Math.cos(rad) * (radius - 12);
            const py = centerY + Math.sin(rad) * (radius - 12);
            ctx.fillRect(px - 3, py - 3, 6, 6);
        }
        // Внутренняя пустота
        ctx.fillStyle = '#1a1c2c';
        for (let angle = 0; angle < 360; angle += 20) {
            const rad = angle * Math.PI / 180;
            const px = centerX + Math.cos(rad) * (radius - 18);
            const py = centerY + Math.sin(rad) * (radius - 18);
            ctx.fillRect(px - 3, py - 3, 6, 6);
        }
    }
    
    function drawBoard() {
        drawPixelGrid();
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                if (board[i][j] === 'X') drawPixelX(j, i);
                else if (board[i][j] === 'O') drawPixelO(j, i);
            }
        }
    }
    
    function checkWinner() {
        for (let pattern of winPatterns) {
            const [a, b, c] = pattern;
            const valA = board[a[0]][a[1]];
            const valB = board[b[0]][b[1]];
            const valC = board[c[0]][c[1]];
            if (valA && valA === valB && valB === valC) {
                return valA;
            }
        }
        if (board.every(row => row.every(cell => cell !== ''))) {
            return 'tie';
        }
        return null;
    }
    
    function handleMove(row, col) {
        if (!gameActive) return false;
        if (board[row][col] !== '') return false;
        
        board[row][col] = currentPlayer;
        drawBoard();
        
        const winner = checkWinner();
        if (winner) {
            gameActive = false;
            if (winner === 'tie') {
                gameStatus.innerText = '🤝 НИЧЬЯ! 🤝';
                gameStatus.style.color = '#ffd43b';
            } else {
                gameStatus.innerText = `🏆 ПОБЕДИЛ ${winner}! 🏆`;
                gameStatus.style.color = '#6c8eff';
            }
            return true;
        }
        
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        gameStatus.innerText = `Ход: ${currentPlayer}`;
        gameStatus.style.color = '#f0f3ff';
        return true;
    }
    
    function resetGame() {
        board = [
            ['', '', ''],
            ['', '', ''],
            ['', '', '']
        ];
        currentPlayer = 'X';
        gameActive = true;
        gameStatus.innerText = 'Ход: X';
        gameStatus.style.color = '#f0f3ff';
        drawBoard();
    }
    
    // Получение клетки по координатам мыши
    function getCellFromClick(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (clientX - rect.left) * scaleX;
        const mouseY = (clientY - rect.top) * scaleY;
        
        const col = Math.floor(mouseX / CELL_SIZE);
        const row = Math.floor(mouseY / CELL_SIZE);
        
        if (row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
            return { row, col };
        }
        return null;
    }
    
    canvas.addEventListener('click', (e) => {
        const cell = getCellFromClick(e.clientX, e.clientY);
        if (cell) {
            handleMove(cell.row, cell.col);
        }
    });
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const cell = getCellFromClick(touch.clientX, touch.clientY);
        if (cell) {
            handleMove(cell.row, cell.col);
        }
    });
    
    // ========== МУЗЫКА ==========
    const music = new Audio('tic_tac_toe_music.mp3');
    music.loop = true;
    music.volume = 0.7;
    let musicStarted = false;
    function startMusic() { 
        if (!musicStarted) { 
            music.play().catch(e => console.log('Музыка не загружена')); 
            musicStarted = true; 
        } 
    }
    document.body.addEventListener('click', startMusic, { once: true });
    document.body.addEventListener('keydown', startMusic, { once: true });
    
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValueSpan = document.getElementById('volumeValue');
    volumeSlider.oninput = () => { 
        music.volume = volumeSlider.value; 
        volumeValueSpan.innerText = Math.round(volumeSlider.value * 100) + '%'; 
    };
    
    // ========== УПРАВЛЕНИЕ ==========
    const resetBtn = document.getElementById('resetBtn');
    resetBtn.onclick = () => resetGame();
    
    window.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space') {
            resetGame();
            e.preventDefault();
        }
        if (e.key === 'p' || e.key === 'P') {
            // Пауза для музыки
            if (musicStarted) {
                if (music.paused) music.play();
                else music.pause();
            }
            e.preventDefault();
        }
    });
    
    // ========== ЗАПУСК ==========
    drawBoard();
</script>
</body>
</html>
