<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧩 Тетрис | Классическая игра с предпоказом фигур</title>
    <style>
        /* ========== ТЁМНЫЙ ДИЗАЙН КАК НА ГЛАВНОМ САЙТЕ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 30% 10%, #0a0f2a, #030617);
            --card-bg: rgba(20, 25, 55, 0.65);
            --glass-border: 1px solid rgba(100, 150, 255, 0.25);
            --accent: #6c8eff;
            --text-light: #f0f3ff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text-light);
            position: relative;
            overflow-x: hidden;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 1rem;
            animation: floatParticle linear forwards;
            opacity: 0.4;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .main-card {
            max-width: 1300px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: var(--glass-border);
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow-title {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b2a5ff, #6c8eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 5px rgba(108, 142, 255, 0.3);}
            100% { text-shadow: 0 0 25px rgba(155, 110, 255, 0.6);}
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .canvas-area {
            text-align: center;
        }
        canvas {
            background: #0a0c1a;
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(108, 142, 255, 0.3);
            image-rendering: crisp-edges;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.5rem;
            padding: 1.2rem;
            min-width: 260px;
            backdrop-filter: blur(4px);
        }
        .score-box {
            background: #0a0c1a;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .score-box div {
            font-size: 1.8rem;
            font-weight: bold;
            color: #6c8eff;
        }
        .next-box {
            background: #0a0c1a;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .next-canvas {
            background: #0a0c1a;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
        }
        .speed-control, .volume-control {
            margin: 1rem 0;
        }
        .speed-control label, .volume-control label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background: #1e1f36;
            height: 4px;
            border-radius: 5px;
        }
        button {
            background: #2a2f4e;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
            width: 100%;
        }
        button:hover {
            background: var(--accent);
            transform: scale(0.98);
        }
        .records-table {
            margin-top: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 0.5rem;
            max-height: 220px;
            overflow-y: auto;
        }
        .records-table h4 {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .records-table table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
        }
        .records-table th, .records-table td {
            padding: 0.3rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nick-input {
            display: flex;
            gap: 0.5rem;
            margin: 0.8rem 0;
        }
        .nick-input input {
            flex: 1;
            background: #1e1f36;
            border: 1px solid #4f5b9e;
            padding: 0.4rem;
            border-radius: 1rem;
            color: white;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #6c8eff;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            opacity: 0.5;
        }
        @media (max-width: 800px) {
            .game-container { flex-direction: column; align-items: center; }
            .info-panel { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1 class="glow-title">🧩 ТЕТРИС · КЛАССИКА</h1>
    <div class="game-container">
        <div class="canvas-area">
            <canvas id="tetrisCanvas" width="300" height="600"></canvas>
            <div style="margin-top: 0.8rem; font-size:0.8rem;">← → ↓ вращение: ↑ | пробел — пауза</div>
        </div>
        <div class="info-panel">
            <div class="score-box">
                🧮 СЧЁТ: <span id="currentScore">0</span>
            </div>
            <div class="next-box">
                🔮 СЛЕДУЮЩАЯ ФИГУРА
                <canvas id="nextCanvas" width="120" height="120" class="next-canvas" style="display:block; margin:0 auto;"></canvas>
            </div>
            <div class="speed-control">
                <label>⚡ Скорость (задержка мс): <span id="speedValue">400</span></label>
                <input type="range" id="speedSlider" min="100" max="700" step="10" value="400">
            </div>
            <div class="volume-control">
                <label>🔊 Громкость музыки: <span id="volumeValue">70%</span></label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            </div>
            <button id="pauseBtn">⏸️ Пауза</button>
            <button id="resetBtn">🔄 Новая игра</button>
            
            <div class="nick-input">
                <input type="text" id="playerNick" placeholder="Ваш ник" maxlength="15">
                <button id="saveRecordBtn">💾 Сохранить рекорд</button>
            </div>
            
            <div class="records-table">
                <h4>🏆 ТАБЛИЦА РЕКОРДОВ 🏆</h4>
                <div id="recordsList">Загрузка...</div>
            </div>
        </div>
    </div>
    <a href="index.html" class="back-link">← Вернуться в лабораторию</a>
    <footer>Музыка: tetris_music.mp3 | Рекорды в tetris_records.txt | Предпоказ следующей фигуры</footer>
</div>

<script>
    // ==================== ЧАСТИЦЫ ====================
    function createParticle() {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const icons = ['✨', '⭐', '💎', '🧩', '🎵', '🔷'];
        particle.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        particle.style.left = Math.random() * 100 + '%';
        particle.style.fontSize = (Math.random() * 20 + 12) + 'px';
        particle.style.animationDuration = (Math.random() * 6 + 5) + 's';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 10000);
    }
    setInterval(createParticle, 800);
    for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 200);

    // ==================== ТЕТРИС ====================
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');
    
    // Размеры поля: 10x20, блок 30x30 (canvas 300x600)
    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 30;
    
    let grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
    let activePiece = null;
    let nextPiece = null;
    let score = 0;
    let gameInterval = null;
    let isPaused = false;
    let currentSpeed = 400;
    
    // Фигуры (классические тетрамино)
    const SHAPES = [
        {   // I
            shape: [[1,1,1,1]],
            color: '#00e5f0'
        },
        {   // O
            shape: [[1,1],[1,1]],
            color: '#f7e476'
        },
        {   // T
            shape: [[0,1,0],[1,1,1]],
            color: '#c084fc'
        },
        {   // S
            shape: [[0,1,1],[1,1,0]],
            color: '#4ade80'
        },
        {   // Z
            shape: [[1,1,0],[0,1,1]],
            color: '#f87171'
        },
        {   // L
            shape: [[1,0,0],[1,1,1]],
            color: '#fb923c'
        },
        {   // J
            shape: [[0,0,1],[1,1,1]],
            color: '#60a5fa'
        }
    ];
    
    function randomPiece() {
        const idx = Math.floor(Math.random() * SHAPES.length);
        const piece = SHAPES[idx];
        return {
            shape: piece.shape.map(row => [...row]),
            color: piece.color,
            x: Math.floor((COLS - piece.shape[0].length) / 2),
            y: 0
        };
    }
    
    function initPieces() {
        nextPiece = randomPiece();
        spawnNewPiece();
    }
    
    function spawnNewPiece() {
        if (!nextPiece) {
            nextPiece = randomPiece();
        }
        activePiece = {
            shape: nextPiece.shape.map(row => [...row]),
            color: nextPiece.color,
            x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
            y: 0
        };
        nextPiece = randomPiece();
        
        if (collision(activePiece.shape, activePiece.x, activePiece.y)) {
            gameOver();
        }
        draw();
        drawNext();
    }
    
    function collision(shape, offsetX, offsetY) {
        for (let y = 0; y < shape.length; y++) {
            for (let x = 0; x < shape[0].length; x++) {
                if (shape[y][x] !== 0) {
                    const boardX = offsetX + x;
                    const boardY = offsetY + y;
                    if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                    if (boardY >= 0 && grid[boardY][boardX] !== 0) return true;
                }
            }
        }
        return false;
    }
    
    function mergePiece() {
        for (let y = 0; y < activePiece.shape.length; y++) {
            for (let x = 0; x < activePiece.shape[0].length; x++) {
                if (activePiece.shape[y][x]) {
                    const boardY = activePiece.y + y;
                    const boardX = activePiece.x + x;
                    if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                        grid[boardY][boardX] = activePiece.color;
                    }
                }
            }
        }
        clearLines();
        spawnNewPiece();
        draw();
    }
    
    function clearLines() {
        let linesCleared = 0;
        for (let row = ROWS - 1; row >= 0; row--) {
            let full = true;
            for (let col = 0; col < COLS; col++) {
                if (grid[row][col] === 0) {
                    full = false;
                    break;
                }
            }
            if (full) {
                grid.splice(row, 1);
                grid.unshift(Array(COLS).fill(0));
                row++;
                linesCleared++;
            }
        }
        
        if (linesCleared > 0) {
            const points = [0, 100, 300, 600, 1000];
            const addScore = points[Math.min(linesCleared, 4)];
            score += addScore;
            document.getElementById('currentScore').innerText = score;
        }
    }
    
    function movePiece(dx, dy) {
        if (!activePiece) return;
        const newX = activePiece.x + dx;
        const newY = activePiece.y + dy;
        if (!collision(activePiece.shape, newX, newY)) {
            activePiece.x = newX;
            activePiece.y = newY;
            draw();
            return true;
        } else if (dy === 1) {
            mergePiece();
        }
        return false;
    }
    
    function rotatePiece() {
        if (!activePiece) return;
        const rotated = activePiece.shape[0].map((_, idx) => activePiece.shape.map(row => row[idx]).reverse());
        if (!collision(rotated, activePiece.x, activePiece.y)) {
            activePiece.shape = rotated;
            draw();
        }
    }
    
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Отрисовка сетки
        ctx.strokeStyle = '#1e2a3a';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i * BLOCK_SIZE, 0);
            ctx.lineTo(i * BLOCK_SIZE, canvas.height);
            ctx.stroke();
            ctx.moveTo(0, i * BLOCK_SIZE);
            ctx.lineTo(canvas.width, i * BLOCK_SIZE);
            ctx.stroke();
        }
        
        // Закреплённые блоки
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                if (grid[row][col] !== 0) {
                    ctx.fillStyle = grid[row][col];
                    ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 1, 3);
                }
            }
        }
        
        // Активная фигура
        if (activePiece) {
            for (let y = 0; y < activePiece.shape.length; y++) {
                for (let x = 0; x < activePiece.shape[0].length; x++) {
                    if (activePiece.shape[y][x]) {
                        const boardX = (activePiece.x + x) * BLOCK_SIZE;
                        const boardY = (activePiece.y + y) * BLOCK_SIZE;
                        ctx.fillStyle = activePiece.color;
                        ctx.fillRect(boardX, boardY, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(boardX, boardY, BLOCK_SIZE - 1, 4);
                    }
                }
            }
        }
    }
    
    function drawNext() {
        nextCtx.clearRect(0, 0, 120, 120);
        nextCtx.fillStyle = '#0a0c1a';
        nextCtx.fillRect(0, 0, 120, 120);
        if (nextPiece) {
            const shape = nextPiece.shape;
            const color = nextPiece.color;
            const blockW = 120 / 4;
            const offsetX = (120 - (shape[0].length * blockW)) / 2;
            const offsetY = (120 - (shape.length * blockW)) / 2;
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[0].length; x++) {
                    if (shape[y][x]) {
                        nextCtx.fillStyle = color;
                        nextCtx.fillRect(offsetX + x * blockW, offsetY + y * blockW, blockW - 2, blockW - 2);
                    }
                }
            }
        }
    }
    
    function gameOver() {
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = null;
        const finalScore = score;
        alert(`💀 Игра окончена! Ваш счёт: ${finalScore}`);
        
        // Проверка рекорда
        if (isHighScore(finalScore) && finalScore > 0) {
            const nick = prompt(`Поздравляем! Вы вошли в таблицу рекордов!\nВведите ваш ник:`, 'ТетрисМастер');
            if (nick && nick.trim()) addRecord(nick.trim(), finalScore);
            else if (finalScore > 0) addRecord('Игрок', finalScore);
        } else if (finalScore > 0) {
            alert(`Рекорд не побит. Попробуйте ещё!`);
        }
        resetGame();
    }
    
    function resetGame() {
        if (gameInterval) clearInterval(gameInterval);
        grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        score = 0;
        document.getElementById('currentScore').innerText = '0';
        isPaused = false;
        document.getElementById('pauseBtn').textContent = '⏸️ Пауза';
        initPieces();
        draw();
        startGameLoop();
    }
    
    function startGameLoop() {
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            if (!isPaused && activePiece) {
                movePiece(0, 1);
                draw();
            }
        }, currentSpeed);
    }
    
    function changeSpeed() {
        currentSpeed = parseInt(speedSlider.value);
        speedValueSpan.innerText = currentSpeed;
        if (gameInterval && !isPaused) {
            startGameLoop();
        }
    }
    
    // ==================== РЕКОРДЫ ====================
    let records = [];
    
    function loadRecords() {
        const stored = localStorage.getItem('tetris_records');
        if (stored) {
            records = JSON.parse(stored);
        } else {
            records = [
                { nick: 'ТетрисГуру', score: 4200 },
                { nick: 'БлокМастер', score: 2800 },
                { nick: 'Линейный', score: 1500 }
            ];
        }
        records.sort((a,b) => b.score - a.score);
        renderRecords();
    }
    
    function renderRecords() {
        if (records.length === 0) {
            recordsDiv.innerHTML = '<p style="text-align:center;">Нет рекордов</p>';
            return;
        }
        let html = '</table><th>#</th><th>Ник</th><th>Счёт</th></tr>';
        records.slice(0, 10).forEach((rec, idx) => {
            html += `<tr><td>${idx+1}</td><td>${escapeHtml(rec.nick)}</td><td>${rec.score}</td></tr>`;
        });
        html += '</table>';
        recordsDiv.innerHTML = html;
    }
    
    function saveRecordsToLocal() {
        localStorage.setItem('tetris_records', JSON.stringify(records));
        renderRecords();
    }
    
    function addRecord(nick, scoreValue) {
        if (!nick || nick.trim() === '') nick = 'Аноним';
        nick = nick.trim().substring(0, 15);
        records.push({ nick: nick, score: scoreValue });
        records.sort((a,b) => b.score - a.score);
        if (records.length > 20) records = records.slice(0, 20);
        saveRecordsToLocal();
    }
    
    function isHighScore(scoreValue) {
        return records.length < 10 || scoreValue > records[records.length-1].score;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function exportRecordsToTxt() {
        let content = "ТЕТРИС - ТАБЛИЦА РЕКОРДОВ\n";
        content += "Ник\tСчёт\n";
        records.forEach(r => { content += `${r.nick}\t${r.score}\n`; });
        const blob = new Blob([content], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'tetris_records.txt';
        a.click();
        URL.revokeObjectURL(a.href);
    }
    
    // ==================== МУЗЫКА ====================
    const music = new Audio('tetris_music.mp3');
    music.loop = true;
    music.volume = 0.7;
    let musicStarted = false;
    function startMusic() {
        if (!musicStarted) {
            music.play().catch(e => console.log('Музыка не загружена'));
            musicStarted = true;
        }
    }
    document.body.addEventListener('click', startMusic, { once: true });
    document.body.addEventListener('keydown', startMusic, { once: true });
    
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValueSpan = document.getElementById('volumeValue');
    volumeSlider.oninput = () => {
        const vol = parseFloat(volumeSlider.value);
        music.volume = vol;
        volumeValueSpan.innerText = Math.round(vol * 100) + '%';
    };
    
    // ==================== UI КНОПКИ ====================
    const speedSlider = document.getElementById('speedSlider');
    const speedValueSpan = document.getElementById('speedValue');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const saveRecordBtn = document.getElementById('saveRecordBtn');
    const playerNickInput = document.getElementById('playerNick');
    const recordsDiv = document.getElementById('recordsList');
    const currentScoreSpan = document.getElementById('currentScore');
    
    speedSlider.addEventListener('input', changeSpeed);
    
    pauseBtn.onclick = () => {
        if (!gameInterval) return;
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Старт' : '⏸️ Пауза';
        draw();
        if (!isPaused) startGameLoop();
    };
    
    resetBtn.onclick = () => { resetGame(); };
    
    saveRecordBtn.onclick = () => {
        let nick = playerNickInput.value.trim();
        if (nick === '') nick = 'Аноним';
        if (score > 0) {
            addRecord(nick, score);
            playerNickInput.value = '';
            alert(`🏆 Рекорд ${score} сохранён для ${nick}!`);
        } else {
            alert('Сыграйте и наберите очки, чтобы сохранить рекорд');
        }
    };
    
    // Управление клавишами
    window.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key === 'ArrowLeft') { movePiece(-1, 0); e.preventDefault(); }
        else if (key === 'ArrowRight') { movePiece(1, 0); e.preventDefault(); }
        else if (key === 'ArrowDown') { movePiece(0, 1); e.preventDefault(); }
        else if (key === 'ArrowUp') { rotatePiece(); e.preventDefault(); }
        else if (key === ' ' || key === 'Space') { e.preventDefault(); pauseBtn.click(); }
    });
    
    // Экспорт рекордов по Shift+R
    window.addEventListener('keydown', (e) => {
        if (e.shiftKey && e.key === 'R') {
            exportRecordsToTxt();
            alert('Рекорды экспортированы в tetris_records.txt');
        }
    });
    
    // Запуск игры
    function init() {
        loadRecords();
        initPieces();
        draw();
        startGameLoop();
    }
    
    init();
</script>
</body>
</html>
