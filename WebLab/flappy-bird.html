<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐦 FLAPPY BIRD | Пиксельная аркада</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 30% 10%, #0a0f2a, #030617);
            --card-bg: rgba(20, 25, 55, 0.65);
            --glass-border: 1px solid rgba(100, 150, 255, 0.25);
            --accent: #6c8eff;
            --text-light: #f0f3ff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text-light);
            position: relative;
            overflow-x: hidden;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 1rem;
            animation: floatParticle linear forwards;
            opacity: 0.4;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .main-card {
            max-width: 1300px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: var(--glass-border);
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow-title {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b2a5ff, #6c8eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 5px rgba(108, 142, 255, 0.3);}
            100% { text-shadow: 0 0 25px rgba(155, 110, 255, 0.6);}
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .canvas-area {
            text-align: center;
        }
        canvas {
            background: #1a3a4a;
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(108, 142, 255, 0.3);
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            cursor: pointer;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.5rem;
            padding: 1.2rem;
            min-width: 260px;
            backdrop-filter: blur(4px);
        }
        .score-box {
            background: #0a0c1a;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .score-box div {
            font-size: 1.8rem;
            font-weight: bold;
            color: #6c8eff;
        }
        .best-box {
            background: #0a0c1a;
            padding: 0.5rem;
            border-radius: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .speed-control, .volume-control {
            margin: 1rem 0;
        }
        .speed-control label, .volume-control label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background: #1e1f36;
            height: 4px;
            border-radius: 5px;
        }
        button {
            background: #2a2f4e;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
            width: 100%;
        }
        button:hover {
            background: var(--accent);
            transform: scale(0.98);
        }
        .records-table {
            margin-top: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 0.5rem;
            max-height: 220px;
            overflow-y: auto;
        }
        .records-table h4 {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .records-table table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
        }
        .records-table th, .records-table td {
            padding: 0.3rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nick-input {
            display: flex;
            gap: 0.5rem;
            margin: 0.8rem 0;
        }
        .nick-input input {
            flex: 1;
            background: #1e1f36;
            border: 1px solid #4f5b9e;
            padding: 0.4rem;
            border-radius: 1rem;
            color: white;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #6c8eff;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            opacity: 0.5;
        }
        @media (max-width: 800px) {
            .game-container { flex-direction: column; align-items: center; }
            .info-panel { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1 class="glow-title">🐦 FLAPPY BIRD · ПИКСЕЛЬНАЯ КЛАССИКА</h1>
    <div class="game-container">
        <div class="canvas-area">
            <canvas id="flappyCanvas" width="400" height="600"></canvas>
            <div style="margin-top: 0.8rem; font-size:0.8rem;">клик / пробел — взмах крыльями | пауза: P</div>
        </div>
        <div class="info-panel">
            <div class="score-box">
                🎯 СЧЁТ: <span id="currentScore">0</span>
            </div>
            <div class="best-box">
                🏆 ЛУЧШИЙ: <span id="bestScore">0</span>
            </div>
            <div class="speed-control">
                <label>🐦 Сила гравитации: <span id="gravityValue">0.4</span></label>
                <input type="range" id="gravitySlider" min="0.2" max="0.8" step="0.02" value="0.4">
            </div>
            <div class="speed-control">
                <label>⚡ Скорость труб: <span id="pipeSpeedValue">2</span></label>
                <input type="range" id="pipeSpeedSlider" min="1.5" max="4" step="0.1" value="2">
            </div>
            <div class="volume-control">
                <label>🔊 Громкость музыки: <span id="volumeValue">70%</span></label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            </div>
            <button id="pauseBtn">⏸️ Пауза</button>
            <button id="resetBtn">🔄 Новая игра</button>
            
            <div class="nick-input">
                <input type="text" id="playerNick" placeholder="Ваш ник" maxlength="15">
                <button id="saveRecordBtn">💾 Сохранить рекорд</button>
            </div>
            
            <div class="records-table">
                <h4>🏆 ТАБЛИЦА РЕКОРДОВ 🏆</h4>
                <div id="recordsList">Загрузка...</div>
            </div>
        </div>
    </div>
    <a href="index.html" class="back-link">← Вернуться в лабораторию</a>
    <footer>Музыка: flappy_music.mp3 | Рекорды в flappy_records.txt | ПИКСЕЛЬНАЯ ГРАФИКА</footer>
</div>

<script>
    // ==================== ЧАСТИЦЫ ====================
    function createParticle() {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const icons = ['✨', '⭐', '🐦', '🎵', '🪶', '💨'];
        particle.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        particle.style.left = Math.random() * 100 + '%';
        particle.style.fontSize = (Math.random() * 20 + 12) + 'px';
        particle.style.animationDuration = (Math.random() * 6 + 5) + 's';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 10000);
    }
    setInterval(createParticle, 800);
    for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 200);

    // ==================== FLAPPY BIRD ====================
    const canvas = document.getElementById('flappyCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    const CW = 400;
    const CH = 600;
    
    // Птица (пиксельная)
    let bird = {
        x: 80,
        y: CH / 2,
        width: 24,
        height: 24,
        velocity: 0,
        gravity: 0.4,
        jumpPower: -6.5
    };
    
    let score = 0;
    let bestScore = 0;
    let gameRunning = true;
    let isPaused = false;
    let animationId = null;
    
    // Трубы
    let pipes = [];
    const PIPE_WIDTH = 52;
    const PIPE_GAP = 140;
    const PIPE_SPACING = 220;
    let pipeSpeed = 2;
    let frameCounter = 0;
    let pipeSpawnCounter = 0;
    const PIPE_SPAWN_DELAY = 100;
    
    // Взрослая пиксельная анимация крыльев
    let wingFlap = 0;
    let birdFrame = 0;
    
    function initPipes() {
        pipes = [];
        pipeSpawnCounter = 60;
    }
    
    function addPipe() {
        const minHeight = 50;
        const maxHeight = CH - PIPE_GAP - 50;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
        pipes.push({
            x: CW,
            topHeight: topHeight,
            bottomY: topHeight + PIPE_GAP,
            passed: false
        });
    }
    
    // ========== ПИКСЕЛЬНАЯ ОТРИСОВКА ==========
    function drawPixelBird() {
        // Тело птицы
        ctx.fillStyle = '#f7d44a';
        ctx.fillRect(bird.x, bird.y, 22, 22);
        ctx.fillStyle = '#e6b422';
        ctx.fillRect(bird.x + 4, bird.y + 4, 6, 6);
        
        // Крыло (с анимацией)
        wingFlap = (wingFlap + 0.3) % (Math.PI * 2);
        const wingOffset = Math.sin(wingFlap) * 4;
        ctx.fillStyle = '#d4a017';
        ctx.fillRect(bird.x - 4 + wingOffset, bird.y + 8, 8, 10);
        
        // Глаз
        ctx.fillStyle = '#fff';
        ctx.fillRect(bird.x + 16, bird.y + 6, 5, 5);
        ctx.fillStyle = '#000';
        ctx.fillRect(bird.x + 17, bird.y + 7, 3, 3);
        ctx.fillStyle = '#fff';
        ctx.fillRect(bird.x + 18, bird.y + 7, 1, 1);
        
        // Клюв
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(bird.x + 22, bird.y + 10, 6, 4);
        
        // Хохолок
        ctx.fillStyle = '#d4a017';
        ctx.fillRect(bird.x + 8, bird.y - 3, 4, 5);
        ctx.fillRect(bird.x + 12, bird.y - 2, 3, 4);
    }
    
    function drawPixelPipe(x, topHeight, isTop) {
        ctx.fillStyle = '#2d6a4f';
        // Ствол трубы
        ctx.fillRect(x, isTop ? 0 : topHeight + PIPE_GAP, PIPE_WIDTH, isTop ? topHeight : CH - (topHeight + PIPE_GAP));
        // Край трубы
        ctx.fillStyle = '#40916c';
        ctx.fillRect(x - 5, isTop ? topHeight - 30 : topHeight + PIPE_GAP, PIPE_WIDTH + 10, 30);
        ctx.fillStyle = '#1b4332';
        ctx.fillRect(x - 3, isTop ? topHeight - 28 : topHeight + PIPE_GAP + 2, PIPE_WIDTH + 6, 26);
        // Детали
        ctx.fillStyle = '#74c69d';
        ctx.fillRect(x + 5, isTop ? topHeight - 20 : topHeight + PIPE_GAP + 10, 8, 8);
        ctx.fillRect(x + 20, isTop ? topHeight - 20 : topHeight + PIPE_GAP + 10, 8, 8);
        ctx.fillRect(x + 35, isTop ? topHeight - 20 : topHeight + PIPE_GAP + 10, 8, 8);
    }
    
    function drawGround() {
        ctx.fillStyle = '#5c4d3c';
        ctx.fillRect(0, CH - 50, CW, 50);
        ctx.fillStyle = '#8b7355';
        for (let i = 0; i < CW; i += 20) {
            ctx.fillRect(i, CH - 50, 10, 8);
        }
        // Пиксельная травка
        ctx.fillStyle = '#4a7c59';
        for (let i = 0; i < CW; i += 12) {
            ctx.fillRect(i, CH - 52, 3, 6);
        }
    }
    
    function drawClouds() {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(50, 80, 40, 20);
        ctx.fillRect(70, 70, 30, 20);
        ctx.fillRect(280, 120, 45, 22);
        ctx.fillRect(300, 110, 35, 20);
        ctx.fillRect(150, 200, 38, 18);
    }
    
    function draw() {
        ctx.clearRect(0, 0, CW, CH);
        
        // Небо
        ctx.fillStyle = '#1a6b8a';
        ctx.fillRect(0, 0, CW, CH);
        
        // Облака
        drawClouds();
        
        // Трубы
        pipes.forEach(pipe => {
            drawPixelPipe(pipe.x, pipe.topHeight, true);
            drawPixelPipe(pipe.x, pipe.topHeight, false);
        });
        
        // Земля
        drawGround();
        
        // Птица
        drawPixelBird();
        
        // Счёт (пиксельный шрифт)
        ctx.font = 'bold 28px monospace';
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 0;
        ctx.fillText(score, CW / 2 - 15, 60);
        
        // Сообщение при старте
        if (!gameRunning && score === 0) {
            ctx.font = '16px monospace';
            ctx.fillStyle = '#fff';
            ctx.fillText('КЛИКНИ, ЧТОБЫ НАЧАТЬ', CW / 2 - 110, CH / 2);
        }
        
        ctx.shadowBlur = 0;
    }
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    function updateGame() {
        if (!gameRunning || isPaused) return;
        
        // Физика птицы
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;
        
        // Верхняя/нижняя граница
        if (bird.y <= 0) {
            bird.y = 0;
            bird.velocity = 0;
        }
        if (bird.y + bird.height >= CH - 48) {
            gameOver();
            return;
        }
        
        // Спавн труб
        if (pipeSpawnCounter <= 0) {
            addPipe();
            pipeSpawnCounter = PIPE_SPAWN_DELAY;
        } else {
            pipeSpawnCounter--;
        }
        
        // Движение труб и проверка столкновений
        for (let i = 0; i < pipes.length; i++) {
            pipes[i].x -= pipeSpeed;
            
            // Столкновение с трубами
            if (bird.x + bird.width > pipes[i].x && bird.x < pipes[i].x + PIPE_WIDTH) {
                if (bird.y < pipes[i].topHeight || bird.y + bird.height > pipes[i].bottomY) {
                    gameOver();
                    return;
                }
            }
            
            // Подсчёт очков
            if (!pipes[i].passed && pipes[i].x + PIPE_WIDTH < bird.x) {
                pipes[i].passed = true;
                score++;
                document.getElementById('currentScore').innerText = score;
                if (score > bestScore) {
                    bestScore = score;
                    document.getElementById('bestScore').innerText = bestScore;
                }
            }
            
            // Удаление труб за экраном
            if (pipes[i].x + PIPE_WIDTH < 0) {
                pipes.splice(i, 1);
                i--;
            }
        }
        
        draw();
    }
    
    function flap() {
        if (!gameRunning) {
            resetGame();
            return;
        }
        if (isPaused) return;
        bird.velocity = bird.jumpPower;
        // Анимация крыла
        wingFlap = 0;
    }
    
    function gameOver() {
        gameRunning = false;
        if (animationId) cancelAnimationFrame(animationId);
        
        const finalScore = score;
        alert(`💀 ИГРА ОКОНЧЕНА!\n🏆 Ваш счёт: ${finalScore}\n🏅 Лучший: ${bestScore}`);
        
        if (isHighScore(finalScore) && finalScore > 0) {
            const nick = prompt(`✨ ПОЗДРАВЛЯЮ! НОВЫЙ РЕКОРД!\nВведите ваш ник:`, 'Птицелёт');
            if (nick && nick.trim()) addRecord(nick.trim(), finalScore);
            else if (finalScore > 0) addRecord('ПиксельнаяПтица', finalScore);
        }
        
        // Обновляем локальный лучший счёт
        if (finalScore > bestScore) {
            bestScore = finalScore;
            document.getElementById('bestScore').innerText = bestScore;
            localStorage.setItem('flappy_best', bestScore);
        }
        
        draw();
    }
    
    function resetGame() {
        gameRunning = true;
        isPaused = false;
        pauseBtn.textContent = '⏸️ Пауза';
        score = 0;
        bird.y = CH / 2;
        bird.velocity = 0;
        document.getElementById('currentScore').innerText = '0';
        initPipes();
        pipeSpawnCounter = 30;
        draw();
        startGameLoop();
    }
    
    // ========== РЕКОРДЫ ==========
    let records = [];
    
    function loadRecords() {
        const stored = localStorage.getItem('flappy_records');
        if (stored) records = JSON.parse(stored);
        else records = [
            { nick: 'Птицелов', score: 35 },
            { nick: 'Небесный', score: 28 },
            { nick: 'Крылатый', score: 22 }
        ];
        records.sort((a,b) => b.score - a.score);
        renderRecords();
        
        // Загружаем лучший счёт
        const savedBest = localStorage.getItem('flappy_best');
        if (savedBest) bestScore = parseInt(savedBest);
        document.getElementById('bestScore').innerText = bestScore;
    }
    
    function renderRecords() {
        const recordsDiv = document.getElementById('recordsList');
        if (records.length === 0) { recordsDiv.innerHTML = '<p>Нет рекордов</p>'; return; }
        let html = '<table><th>#</th><th>Ник</th><th>Счёт</th></tr>';
        records.slice(0, 10).forEach((rec, idx) => {
            html += `<tr><td>${idx+1}</td><td>${escapeHtml(rec.nick)}</td><td>${rec.score}</td></tr>`;
        });
        recordsDiv.innerHTML = '</table>' + html + '</table>';
    }
    
    function saveRecordsToLocal() { localStorage.setItem('flappy_records', JSON.stringify(records)); renderRecords(); }
    function addRecord(nick, scoreValue) { if (!nick || nick.trim() === '') nick = 'Аноним'; nick = nick.trim().substring(0, 15); records.push({ nick, score: scoreValue }); records.sort((a,b) => b.score - a.score); if (records.length > 20) records = records.slice(0, 20); saveRecordsToLocal(); }
    function isHighScore(scoreValue) { return records.length < 10 || scoreValue > records[records.length-1].score; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function exportRecordsToTxt() { let content = "FLAPPY BIRD - РЕКОРДЫ\nНик\tСчёт\n"; records.forEach(r => content += `${r.nick}\t${r.score}\n`); const blob = new Blob([content], {type: 'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'flappy_records.txt'; a.click(); URL.revokeObjectURL(a.href); }
    
    // ========== НАСТРОЙКИ ==========
    const gravitySlider = document.getElementById('gravitySlider');
    const gravityValue = document.getElementById('gravityValue');
    gravitySlider.addEventListener('input', () => {
        bird.gravity = parseFloat(gravitySlider.value);
        gravityValue.innerText = bird.gravity.toFixed(2);
    });
    
    const pipeSpeedSlider = document.getElementById('pipeSpeedSlider');
    const pipeSpeedValue = document.getElementById('pipeSpeedValue');
    pipeSpeedSlider.addEventListener('input', () => {
        pipeSpeed = parseFloat(pipeSpeedSlider.value);
        pipeSpeedValue.innerText = pipeSpeed.toFixed(1);
    });
    
    // ========== МУЗЫКА ==========
    const music = new Audio('flappybird_music.mp3');
    music.loop = true;
    music.volume = 0.7;
    let musicStarted = false;
    function startMusic() { if (!musicStarted) { music.play().catch(e => console.log('Музыка:')); musicStarted = true; } }
    document.body.addEventListener('click', startMusic, { once: true });
    document.body.addEventListener('keydown', startMusic, { once: true });
    
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValueSpan = document.getElementById('volumeValue');
    volumeSlider.oninput = () => { music.volume = volumeSlider.value; volumeValueSpan.innerText = Math.round(volumeSlider.value * 100) + '%'; };
    
    // ========== UI ==========
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const saveRecordBtn = document.getElementById('saveRecordBtn');
    const playerNickInput = document.getElementById('playerNick');
    
    pauseBtn.onclick = () => { if (!gameRunning) return; isPaused = !isPaused; pauseBtn.textContent = isPaused ? '▶️ Старт' : '⏸️ Пауза'; draw(); if (!isPaused) startGameLoop(); };
    resetBtn.onclick = () => resetGame();
    saveRecordBtn.onclick = () => { let nick = playerNickInput.value.trim(); if (nick === '') nick = 'Аноним'; if (score > 0) { addRecord(nick, score); playerNickInput.value = ''; alert(`🏆 Рекорд ${score} сохранён!`); } else alert('Сыграйте, чтобы сохранить рекорд'); };
    
    window.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space') { flap(); e.preventDefault(); }
        else if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); e.preventDefault(); }
        else if (e.shiftKey && e.key === 'R') { exportRecordsToTxt(); alert('Рекорды экспортированы'); }
    });
    
    canvas.addEventListener('click', () => flap());
    
    function gameLoop() { updateGame(); animationId = requestAnimationFrame(gameLoop); }
    function startGameLoop() { if (animationId) cancelAnimationFrame(animationId); animationId = requestAnimationFrame(gameLoop); }
    
    function init() {
        loadRecords();
        initPipes();
        bird.gravity = 0.4;
        pipeSpeed = 2;
        draw();
        startGameLoop();
    }
    
    init();
</script>
</body>
</html>
